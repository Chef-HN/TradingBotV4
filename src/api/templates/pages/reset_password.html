{% extends "base.html" %}
{% block title %}New Password — TradingBotV3{% endblock %}
{% block content %}
<h1>Set New Password</h1>
<div class="info">A 6-digit code was sent to <strong>{{ email }}</strong></div>
<form action="/auth/reset-password" method="post">
  <input type="hidden" name="email" value="{{ email }}">
  <div class="field">
    <label>Verification Code</label>
    <input class="otp-input" type="text" name="code" required maxlength="6" pattern="\d{6}" autofocus>
  </div>
  <div class="field">
    <label>New Password</label>
    <input type="password" name="new_password" required minlength="6">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" name="confirm_password" required minlength="6">
  </div>
  <button class="btn" type="submit">Save Password</button>
</form>
<div class="links">
  <form action="/auth/forgot-password" method="post" style="display:inline">
    <input type="hidden" name="email" value="{{ email }}">
    <button type="submit" style="background:none;border:none;color:var(--blue);cursor:pointer;font-family:inherit;font-size:12px;">
      Resend code
    </button>
  </form>
  &nbsp;·&nbsp;
  <a href="/auth/login">Back to sign in</a>
</div>
{% endblock %}
